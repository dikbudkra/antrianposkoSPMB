<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Loket SPMB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f3f4f6; justify-content: flex-start; padding: 20px;">

  <div style="background: white; width: 100%; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;">
    
    <div style="background: #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 30px; display: inline-block;">
      <label style="font-weight: bold; margin-right: 10px; font-size: 18px;">Pilih Loket Anda:</label>
      <select id="pilihLoket" style="font-size: 18px; padding: 5px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; cursor: pointer;">
      </select>
    </div>

    <div style="margin-bottom: 30px;">
      <p style="font-size: 18px; color: #6b7280; font-weight: bold; margin-bottom: -10px;">NOMOR ANTRIAN SAAT INI</p>
      <h1 id="angkaLayar" style="font-size: 120px; font-weight: 900; color: #1e3a8a; margin: 0;">001</h1>
      <p style="font-size: 14px; color: #10b981; font-weight: bold; margin-top: -10px;">Antrian Terakhir Masuk: <span id="angkaTerakhir">000</span></p>
    </div>

    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;">
      <button id="btnPrev" class="btn-admin" style="width: auto; background-color: #6b7280;">⬅️ Sebelumnya</button>
      <button id="btnNext" class="btn-admin" style="width: auto; background-color: #6b7280;">Selanjutnya ➡️</button>
      <button id="btnPanggil" class="btn-admin aktif" style="width: auto; font-size: 18px; padding: 15px 30px;">📢 PANGGIL</button>
      <button id="btnProres" class="btn-admin" style="width: auto; background-color: #2563eb; font-size: 18px; padding: 15px 30px;">✅ PROSES (Selesai)</button>
    </div>

    <div style="text-align: left; border-top: 2px dashed #e5e7eb; padding-top: 20px;">
      <h4 style="margin-top: 0; color: #ef4444; font-weight: bold;">⚠️ Antrian Terlewat / Belum Selesai</h4>
      <div id="gridBelumProses" style="display: flex; gap: 8px; flex-wrap: wrap;">
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMSjHyb_xoHqoBnTrxsqNJ0lOwCjq-xMI",
      authDomain: "antrian-spmb-karanganyar.firebaseapp.com",
      databaseURL: "https://antrian-spmb-karanganyar-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "antrian-spmb-karanganyar",
      storageBucket: "antrian-spmb-karanganyar.firebasestorage.app",
      messagingSenderId: "1832293785",
      appId: "1:1832293785:web:32db526cb54637caf7ef08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let nomorAktif = 1;

    function getTanggalSekarang() {
      const n = new Date();
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
    }

    function getJamSekarang() {
      const n = new Date();
      return `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`;
    }

    function updateLayar() {
      document.getElementById('angkaLayar').innerText = String(nomorAktif).padStart(3, '0');
    }

    onValue(ref(db, 'sistem/total_antrian'), (snapshot) => {
      const total = snapshot.val() || 0;
      document.getElementById('angkaTerakhir').innerText = String(total).padStart(3, '0');
    });

    onValue(ref(db, 'sistem/pengaturan/jumlah_loket'), (snapshot) => {
      const jumlah = snapshot.val() || 10;
      const select = document.getElementById('pilihLoket');
      const pilihanSaatIni = select.value;
      select.innerHTML = '';
      for(let i=1; i<=jumlah; i++) {
        select.innerHTML += `<option value="${i}">Loket ${i}</option>`;
      }
      if(pilihanSaatIni && pilihanSaatIni <= jumlah) select.value = pilihanSaatIni;
    });

    onValue(ref(db, 'sistem/antrian_global'), (snapshot) => {
      if(snapshot.exists()) {
        nomorAktif = snapshot.val();
        updateLayar();
      }
    });

    const tglHariIni = getTanggalSekarang();
    onValue(ref(db, `antrian_data/${tglHariIni}`), (snapshot) => {
      const gridBelumProses = document.getElementById('gridBelumProses');
      gridBelumProses.innerHTML = '';
      let adaYangKosong = false;

      snapshot.forEach((child) => {
        const nomor = parseInt(child.key);
        const data = child.val();
        
        if(data.status !== 2 && nomor < nomorAktif) {
          adaYangKosong = true;
          const kotak = document.createElement('div');
          kotak.style.padding = "5px 12px";
          kotak.style.background = data.status === 1 ? "#fef08a" : "#f1f5f9";
          kotak.style.border = "1px solid #cbd5e1";
          kotak.style.borderRadius = "6px";
          kotak.style.fontSize = "14px";
          kotak.style.fontWeight = "bold";
          kotak.style.cursor = "pointer";
          kotak.innerText = String(nomor).padStart(3, '0');
          
          kotak.onclick = () => {
            nomorAktif = nomor;
            updateLayar();
          };
          gridBelumProses.appendChild(kotak);
        }
      });

      if(!adaYangKosong) {
        gridBelumProses.innerHTML = '<span style="font-size:12px; color:#9ca3af;">Tidak ada antrian yang terlewat.</span>';
      }
    });

    document.getElementById('btnNext').onclick = () => {
      nomorAktif++;
      updateLayar();
    };

    document.getElementById('btnPrev').onclick = () => {
      if(nomorAktif > 1) {
        nomorAktif--;
        updateLayar();
      }
    };

    document.getElementById('btnPanggil').onclick = () => {
      const loketPilihan = document.getElementById('pilihLoket').value;
      set(ref(db, 'sistem/panggilan_sekarang'), {
        nomor: nomorAktif,
        loket: loketPilihan,
        waktu: Date.now()
      });
      update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { status: 1 });
    };

    // UPDATE: Menyimpan data nomor loket yang memproses antrian hingga selesai
    document.getElementById('btnProres').onclick = () => {
      const loketPilihan = document.getElementById('pilihLoket').value;
      update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { 
        status: 2,
        waktu_proses: getJamSekarang(),
        loket: loketPilihan
      });
      
      set(ref(db, 'sistem/antrian_global'), nomorAktif + 1);
    };
  </script>
</body>
</html>
