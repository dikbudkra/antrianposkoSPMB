<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Loket SPMB</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .koneksi-badge {
      position: absolute; top: 20px; right: 20px; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s;
    }
    .btn-disabled {
      background-color: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed !important; transform: none !important; box-shadow: none !important;
    }
    .marquee-container {
      background: #1e293b; color: #f8fafc; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 10px;
    }
  </style>
</head>
<body style="background-color: #f3f4f6; justify-content: flex-start; padding: 20px; position: relative;">

  <div id="statusKoneksi" class="koneksi-badge" style="background: #ef4444; color: white;">🔴 OFFLINE</div>

  <div style="background: white; width: 100%; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-top: 20px;">
    
    <div class="marquee-container">
      <marquee id="marqueeInfo" scrollamount="6">Memuat informasi loket aktif...</marquee>
    </div>

    <div style="background: #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: inline-block;">
      <label style="font-weight: bold; margin-right: 10px; font-size: 18px;">Pilih Loket Anda:</label>
      <select id="pilihLoket" style="font-size: 18px; padding: 5px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; cursor: pointer;">
      </select>
    </div>

    <div style="margin-bottom: 30px;">
      <div id="badgeStatus" class="status-badge" style="background: #e2e8f0; color: #475569;">MENUNGGU</div>
      <p style="font-size: 18px; color: #6b7280; font-weight: bold; margin-bottom: -10px; margin-top: 0;">NOMOR ANTRIAN</p>
      <h1 id="angkaLayar" style="font-size: 120px; font-weight: 900; color: #1e3a8a; margin: 0;">001</h1>
      <p style="font-size: 14px; color: #10b981; font-weight: bold; margin-top: -10px;">Antrian Terakhir Masuk: <span id="angkaTerakhir">000</span></p>
    </div>

    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;">
      <button id="btnPrev" class="btn-admin" style="width: auto; background-color: #6b7280;">⬅️ Prev</button>
      <button id="btnNext" class="btn-admin" style="width: auto; background-color: #6b7280;">Next ➡️</button>
      <button id="btnPanggil" class="btn-admin aktif" style="width: auto; font-size: 16px; padding: 15px 25px;">📢 1. PANGGIL</button>
      <button id="btnProses" class="btn-admin" style="width: auto; background-color: #eab308; color: black; font-size: 16px; padding: 15px 25px;">⚙️ 2. PROSES</button>
      <button id="btnSelesai" class="btn-admin" style="width: auto; background-color: #10b981; font-size: 16px; padding: 15px 25px;">✅ 3. SELESAI</button>
    </div>

    <div style="text-align: left; border-top: 2px dashed #e5e7eb; padding-top: 20px;">
      <h4 style="margin-top: 0; color: #ef4444; font-weight: bold;">⚠️ Antrian Terlewat / Menunggu</h4>
      <div id="gridBelumProses" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMSjHyb_xoHqoBnTrxsqNJ0lOwCjq-xMI",
      authDomain: "antrian-spmb-karanganyar.firebaseapp.com",
      databaseURL: "https://antrian-spmb-karanganyar-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "antrian-spmb-karanganyar",
      storageBucket: "antrian-spmb-karanganyar.firebasestorage.app",
      messagingSenderId: "1832293785",
      appId: "1:1832293785:web:32db526cb54637caf7ef08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Variabel Kontrol
    let nomorAktif = 1;
    let totalAntrian = 0; 
    let antrianGlobal = 1;
    let isLocked = false; 
    let statusAntrianSaatIni = 0; 

    function getTanggalSekarang() {
      const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
    }
    function getJamSekarang() {
      const n = new Date(); return `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`;
    }

    onValue(ref(db, ".info/connected"), (snap) => {
      const el = document.getElementById('statusKoneksi');
      if (snap.val() === true) {
        el.innerText = "🟢 ONLINE"; el.style.background = "#10b981";
      } else {
        el.innerText = "🔴 OFFLINE"; el.style.background = "#ef4444";
      }
    });

    function renderTombol() {
      const btnPanggil = document.getElementById('btnPanggil');
      const btnProses = document.getElementById('btnProses');
      const btnSelesai = document.getElementById('btnSelesai');
      const btnNext = document.getElementById('btnNext');
      const btnPrev = document.getElementById('btnPrev');
      const badge = document.getElementById('badgeStatus');

      // Matikan semua tombol terlebih dahulu
      btnPanggil.classList.add('btn-disabled'); btnPanggil.disabled = true;
      btnProses.classList.add('btn-disabled'); btnProses.disabled = true;
      btnSelesai.classList.add('btn-disabled'); btnSelesai.disabled = true;
      btnNext.classList.add('btn-disabled'); btnNext.disabled = true;
      btnPrev.classList.add('btn-disabled'); btnPrev.disabled = true;

      if (isLocked) {
        if (statusAntrianSaatIni === 1) {
            badge.innerText = "SUDAH DIPANGGIL"; badge.style.background = "#fef08a"; badge.style.color = "#854d0e";
            btnPanggil.classList.remove('btn-disabled'); btnPanggil.disabled = false; 
            btnProses.classList.remove('btn-disabled'); btnProses.disabled = false; 
        } else if (statusAntrianSaatIni === 2) {
            badge.innerText = "SEDANG DIPROSES"; badge.style.background = "#3b82f6"; badge.style.color = "white";
            btnSelesai.classList.remove('btn-disabled'); btnSelesai.disabled = false; 
        }
      } else {
        btnNext.classList.remove('btn-disabled'); btnNext.disabled = false;
        btnPrev.classList.remove('btn-disabled'); btnPrev.disabled = false;
        
        if (statusAntrianSaatIni === 0 || statusAntrianSaatIni === 3 || statusAntrianSaatIni === 4) {
            badge.innerText = "MENUNGGU PANGGILAN"; badge.style.background = "#e2e8f0"; badge.style.color = "#475569";
            btnPanggil.classList.remove('btn-disabled'); btnPanggil.disabled = false;
        }
      }
    }

    function updateLayarLokal() {
      document.getElementById('angkaLayar').innerText = String(nomorAktif).padStart(3, '0');
      get(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`)).then(snap => {
        const d = snap.val();
        statusAntrianSaatIni = d ? (d.status || 0) : 0;
        const myLoket = document.getElementById('pilihLoket').value;
        
        if (d && (d.status === 1 || d.status === 2)) {
            if (d.loket && d.loket !== myLoket) {
                document.getElementById('badgeStatus').innerText = `DIAMBIL LOKET ${d.loket}`;
                document.getElementById('badgeStatus').style.background = "#ef4444";
                document.getElementById('badgeStatus').style.color = "white";
                isLocked = false; 
                renderTombol(); 
            } else {
                isLocked = true; 
                renderTombol();
            }
        } else {
            isLocked = false;
            renderTombol();
        }
      });
    }

    onValue(ref(db, 'sistem/total_antrian'), (snapshot) => {
      totalAntrian = snapshot.val() || 0; 
      document.getElementById('angkaTerakhir').innerText = String(totalAntrian).padStart(3, '0');
    });

    onValue(ref(db, 'sistem/pengaturan/jumlah_loket'), (snapshot) => {
      const jumlah = snapshot.val() || 10;
      const select = document.getElementById('pilihLoket');
      const pilihanSaatIni = select.value;
      select.innerHTML = '';
      for(let i=1; i<=jumlah; i++) { select.innerHTML += `<option value="${i}">Loket ${i}</option>`; }
      if(pilihanSaatIni && pilihanSaatIni <= jumlah) select.value = pilihanSaatIni;
    });

    // --- PERBAIKAN: Sensor saat dropdown loket diubah ---
    document.getElementById('pilihLoket').addEventListener('change', () => {
      updateLayarLokal(); // Refresh tampilan dan status kunci seketika!
    });
    // ----------------------------------------------------

    onValue(ref(db, 'sistem/antrian_global'), (snapshot) => {
      if(snapshot.exists()) {
        antrianGlobal = snapshot.val();
        if (!isLocked) {
          nomorAktif = antrianGlobal;
          updateLayarLokal();
        }
      }
    });

    onValue(ref(db, `antrian_data/${getTanggalSekarang()}`), (snapshot) => {
      const gridBelumProses = document.getElementById('gridBelumProses');
      gridBelumProses.innerHTML = '';
      let adaYangKosong = false;
      let teksMarquee = "";

      snapshot.forEach((child) => {
        const nomor = parseInt(child.key);
        const data = child.val();
        
        if(data.status === 1 || data.status === 2) {
          const aksi = data.status === 1 ? "memanggil" : "melayani";
          teksMarquee += `🟢 Loket ${data.loket} ${aksi} Antrean ${String(nomor).padStart(3, '0')} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; `;
        }

        if((data.status === 0 || data.status === 4) && nomor < antrianGlobal) {
          adaYangKosong = true;
          const kotak = document.createElement('div');
          kotak.style.padding = "5px 12px";
          kotak.style.background = "#f1f5f9";
          kotak.style.border = "1px solid #cbd5e1";
          kotak.style.borderRadius = "6px";
          kotak.style.fontSize = "14px";
          kotak.style.fontWeight = "bold";
          kotak.style.cursor = "pointer";
          kotak.innerText = String(nomor).padStart(3, '0');
          
          kotak.onclick = () => {
            if(!isLocked) {
                nomorAktif = nomor;
                updateLayarLokal();
            } else {
                alert("Selesaikan dulu antrean Anda saat ini!");
            }
          };
          gridBelumProses.appendChild(kotak);
        }
      });

      document.getElementById('marqueeInfo').innerHTML = teksMarquee !== "" ? teksMarquee : "Kondisi lengang. Tidak ada loket yang sedang melayani tamu.";
      if(!adaYangKosong) gridBelumProses.innerHTML = '<span style="font-size:12px; color:#9ca3af;">Tidak ada antrian yang terlewat.</span>';
    });

    document.getElementById('btnNext').onclick = () => {
      if (nomorAktif < totalAntrian) {
        if (nomorAktif === antrianGlobal) {
            update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { status: 4 }); // 4 = Terlewat
            set(ref(db, 'sistem/antrian_global'), antrianGlobal + 1);
        } else {
            nomorAktif++;
            updateLayarLokal();
        }
      }
    };

    document.getElementById('btnPrev').onclick = () => {
      if(nomorAktif > 1) { nomorAktif--; updateLayarLokal(); }
    };

    document.getElementById('btnPanggil').onclick = () => {
      const loketPilihan = document.getElementById('pilihLoket').value;
      const refAntrian = ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`);
      
      get(refAntrian).then((snap) => {
        const d = snap.val();
        if (d && (d.status === 1 || d.status === 2 || d.status === 3)) {
            if (d.loket && d.loket !== loketPilihan) {
                alert(`Maaf, Antrean ${String(nomorAktif).padStart(3, '0')} baru saja diambil oleh Loket ${d.loket}`);
                return;
            }
        }
        
        set(ref(db, 'sistem/panggilan_sekarang'), { nomor: nomorAktif, loket: loketPilihan, waktu: Date.now() });
        update(refAntrian, { status: 1, loket: loketPilihan }).then(() => {
           if (nomorAktif === antrianGlobal && antrianGlobal < totalAntrian) {
               set(ref(db, 'sistem/antrian_global'), antrianGlobal + 1);
           }
           updateLayarLokal();
        });
      });
    };

    document.getElementById('btnProses').onclick = () => {
      const loketPilihan = document.getElementById('pilihLoket').value;
      update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { 
        status: 2, 
        waktu_proses: getJamSekarang(), 
        loket: loketPilihan 
      }).then(() => {
        updateLayarLokal();
      });
    };

    document.getElementById('btnSelesai').onclick = () => {
      if(confirm(`Apakah tamu antrean ${String(nomorAktif).padStart(3, '0')} sudah benar-benar SELESAI dilayani?`)) {
        update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { 
          status: 3, 
          waktu_selesai: getJamSekarang() 
        }).then(() => {
          isLocked = false; 
          nomorAktif = antrianGlobal; 
          updateLayarLokal();
        });
      }
    };
  </script>

  <script>
    const htmlLogin = `
    <div id="layarLogin" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
      <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;">
        <h2 style="margin-top: 0; color: #1e3a8a;">Loket Terkunci</h2>
        <p style="color: #6b7280; margin-bottom: 20px; font-size: 14px;" id="teksNotifikasi">Silakan masukkan password petugas untuk mengakses panel Loket.</p>
        
        <input type="password" id="inputPassword" placeholder="Masukkan Password" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box;">
        <button id="btnLogin" style="width: 100%; padding: 12px; font-size: 16px; background-color: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">BUKA KUNCI</button>
        
        <div id="spinnerLogin" style="display: none; margin-top: 15px;">
           <div style="width: 24px; height: 24px; border: 3px solid #cbd5e1; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
           <p style="font-size: 12px; color: #6b7280; margin-top: 8px;" id="teksSpinner">Memverifikasi Otentikasi...</p>
        </div>
      </div>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    `;
    document.body.insertAdjacentHTML('beforeend', htmlLogin);
    const PASS_BENAR = "Posk02026!"; const BATAS_WAKTU_MS = 2 * 60 * 60 * 1000;
    function cekSesi() {
      const sesi = localStorage.getItem('sesiPoskoAdmin'); const waktuSesi = localStorage.getItem('waktuSesiPoskoAdmin');
      if (sesi === 'aktif' && waktuSesi) {
        if ((Date.now() - parseInt(waktuSesi)) < BATAS_WAKTU_MS) {
          document.getElementById('layarLogin').style.display = 'none';
          setTimeout(prosesLogout, BATAS_WAKTU_MS - (Date.now() - parseInt(waktuSesi)));
        } else { munculkanNotifikasiSesiHabis(); }
      }
    }
    function prosesLogout() {
      localStorage.removeItem('sesiPoskoAdmin'); localStorage.removeItem('waktuSesiPoskoAdmin');
      document.getElementById('layarLogin').style.display = 'flex';
      document.getElementById('btnLogin').style.display = 'none';
      document.getElementById('inputPassword').style.display = 'none';
      document.getElementById('spinnerLogin').style.display = 'block';
      document.getElementById('teksNotifikasi').innerText = "Sesi Petugas telah berakhir. Mengakhiri sesi dengan aman...";
      setTimeout(() => {
        document.getElementById('spinnerLogin').style.display = 'none';
        document.getElementById('btnLogin').style.display = 'block';
        document.getElementById('inputPassword').style.display = 'block';
        munculkanNotifikasiSesiHabis();
      }, 1500);
    }
    function munculkanNotifikasiSesiHabis() {
      document.getElementById('layarLogin').style.display = 'flex';
      document.getElementById('teksNotifikasi').innerHTML = '<span style="color: #ef4444; font-weight: bold;"><br>Silakan login kembali.</span>';
      document.getElementById('inputPassword').value = '';
    }
    document.getElementById('btnLogin').addEventListener('click', () => {
      const pass = document.getElementById('inputPassword').value;
      document.getElementById('btnLogin').style.display = 'none';
      document.getElementById('spinnerLogin').style.display = 'block';
      setTimeout(() => {
        if (pass === PASS_BENAR) {
          localStorage.setItem('sesiPoskoAdmin', 'aktif'); localStorage.setItem('waktuSesiPoskoAdmin', Date.now());
          document.getElementById('spinnerLogin').style.display = 'none';
          document.getElementById('btnLogin').style.display = 'block';
          document.getElementById('layarLogin').style.display = 'none';
          setTimeout(prosesLogout, BATAS_WAKTU_MS);
        } else {
          document.getElementById('spinnerLogin').style.display = 'none';
          document.getElementById('btnLogin').style.display = 'block';
          alert('Password Salah! Silakan coba lagi.');
        }
      }, 800); 
    });
    cekSesi();
  </script>
</body>
</html>
