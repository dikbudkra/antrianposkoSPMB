<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Loket SPMB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f3f4f6; justify-content: flex-start; padding: 20px;">

  <div style="background: white; width: 100%; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;">
    
    <div style="background: #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 30px; display: inline-block;">
      <label style="font-weight: bold; margin-right: 10px; font-size: 18px;">Pilih Loket Anda:</label>
      <select id="pilihLoket" style="font-size: 18px; padding: 5px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: bold; cursor: pointer;">
      </select>
    </div>

    <div style="margin-bottom: 30px;">
      <p style="font-size: 18px; color: #6b7280; font-weight: bold; margin-bottom: -10px;">NOMOR ANTRIAN SAAT INI</p>
      <h1 id="angkaLayar" style="font-size: 120px; font-weight: 900; color: #1e3a8a; margin: 0;">001</h1>
      <p style="font-size: 14px; color: #10b981; font-weight: bold; margin-top: -10px;">Antrian Terakhir Masuk: <span id="angkaTerakhir">000</span></p>
    </div>

    <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;">
      <button id="btnPrev" class="btn-admin" style="width: auto; background-color: #6b7280;">⬅️ Sebelumnya</button>
      <button id="btnNext" class="btn-admin" style="width: auto; background-color: #6b7280;">Selanjutnya ➡️</button>
      <button id="btnPanggil" class="btn-admin aktif" style="width: auto; font-size: 18px; padding: 15px 30px;">📢 PANGGIL</button>
      <button id="btnProres" class="btn-admin" style="width: auto; background-color: #2563eb; font-size: 18px; padding: 15px 30px;">✅ PROSES (Selesai)</button>
    </div>

    <div style="text-align: left; border-top: 2px dashed #e5e7eb; padding-top: 20px;">
      <h4 style="margin-top: 0; color: #ef4444; font-weight: bold;">⚠️ Antrian Terlewat / Belum Selesai</h4>
      <div id="gridBelumProses" style="display: flex; gap: 8px; flex-wrap: wrap;">
        </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMSjHyb_xoHqoBnTrxsqNJ0lOwCjq-xMI",
      authDomain: "antrian-spmb-karanganyar.firebaseapp.com",
      databaseURL: "https://antrian-spmb-karanganyar-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "antrian-spmb-karanganyar",
      storageBucket: "antrian-spmb-karanganyar.firebasestorage.app",
      messagingSenderId: "1832293785",
      appId: "1:1832293785:web:32db526cb54637caf7ef08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let nomorAktif = 1;

    function getTanggalSekarang() {
      const n = new Date();
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
    }

    function getJamSekarang() {
      const n = new Date();
      return `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`;
    }

    function updateLayar() {
      document.getElementById('angkaLayar').innerText = String(nomorAktif).padStart(3, '0');
    }

    // Ambil data nomor terakhir yang dicetak hari ini
    onValue(ref(db, 'sistem/total_antrian'), (snapshot) => {
      const total = snapshot.val() || 0;
      document.getElementById('angkaTerakhir').innerText = String(total).padStart(3, '0');
    });

    onValue(ref(db, 'sistem/pengaturan/jumlah_loket'), (snapshot) => {
      const jumlah = snapshot.val() || 10;
      const select = document.getElementById('pilihLoket');
      const pilihanSaatIni = select.value;
      select.innerHTML = '';
      for(let i=1; i<=jumlah; i++) {
        select.innerHTML += `<option value="${i}">Loket ${i}</option>`;
      }
      if(pilihanSaatIni && pilihanSaatIni <= jumlah) select.value = pilihanSaatIni;
    });

    onValue(ref(db, 'sistem/antrian_global'), (snapshot) => {
      if(snapshot.exists()) {
        nomorAktif = snapshot.val();
        updateLayar();
      }
    });

    // Baca antrian yang terlewat (Lebih kecil dari layar saat ini, tapi belum selesai)
    const tglHariIni = getTanggalSekarang();
    onValue(ref(db, `antrian_data/${tglHariIni}`), (snapshot) => {
      const gridBelumProses = document.getElementById('gridBelumProses');
      gridBelumProses.innerHTML = '';
      let adaYangKosong = false;

      snapshot.forEach((child) => {
        const nomor = parseInt(child.key);
        const data = child.val();
        
        // LOGIKA BARU: Hanya tampil jika status bukan 2 DAN nomornya lebih kecil dari layar saat ini
        if(data.status !== 2 && nomor < nomorAktif) {
          adaYangKosong = true;
          const kotak = document.createElement('div');
          kotak.style.padding = "5px 12px";
          kotak.style.background = data.status === 1 ? "#fef08a" : "#f1f5f9";
          kotak.style.border = "1px solid #cbd5e1";
          kotak.style.borderRadius = "6px";
          kotak.style.fontSize = "14px";
          kotak.style.fontWeight = "bold";
          kotak.style.cursor = "pointer";
          kotak.innerText = String(nomor).padStart(3, '0');
          
          // Jika diklik, layar utama akan melompat kembali ke nomor yang terlewat ini
          kotak.onclick = () => {
            nomorAktif = nomor;
            updateLayar();
          };
          gridBelumProses.appendChild(kotak);
        }
      });

      if(!adaYangKosong) {
        gridBelumProses.innerHTML = '<span style="font-size:12px; color:#9ca3af;">Tidak ada antrian yang terlewat.</span>';
      }
    });

    document.getElementById('btnNext').onclick = () => {
      nomorAktif++;
      updateLayar();
    };

    document.getElementById('btnPrev').onclick = () => {
      if(nomorAktif > 1) {
        nomorAktif--;
        updateLayar();
      }
    };

    document.getElementById('btnPanggil').onclick = () => {
      const loketPilihan = document.getElementById('pilihLoket').value;
      set(ref(db, 'sistem/panggilan_sekarang'), {
        nomor: nomorAktif,
        loket: loketPilihan,
        waktu: Date.now()
      });
      update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { status: 1 });
    };

    document.getElementById('btnProres').onclick = () => {
      update(ref(db, `antrian_data/${getTanggalSekarang()}/${nomorAktif}`), { 
        status: 2,
        waktu_proses: getJamSekarang()
      });
      
      // Ambil nomor terbesar yang sudah diproses untuk auto-next
      set(ref(db, 'sistem/antrian_global'), nomorAktif + 1);
    };
  </script>
<script>
  // 1. Membangun Layar Login & Animasi Spinner secara Otomatis
  const htmlLogin = `
  <div id="layarLogin" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;">
      <h2 style="margin-top: 0; color: #1e3a8a;">Sistem Terkunci</h2>
      <p style="color: #6b7280; margin-bottom: 20px; font-size: 14px;" id="teksNotifikasi">Silakan masukkan password untuk mengakses halaman.</p>
      
      <input type="password" id="inputPassword" placeholder="Masukkan Password" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box;">
      <button id="btnLogin" style="width: 100%; padding: 12px; font-size: 16px; background-color: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">BUKA KUNCI</button>
      
      <div id="spinnerLogin" style="display: none; margin-top: 15px;">
         <div style="width: 24px; height: 24px; border: 3px solid #cbd5e1; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
         <p style="font-size: 12px; color: #6b7280; margin-top: 8px;" id="teksSpinner">Memverifikasi...</p>
      </div>
    </div>
  </div>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  `;
  document.body.insertAdjacentHTML('beforeend', htmlLogin);

  // 2. Logika Autentikasi dan Kadaluarsa Sesi
  const PASS_BENAR = "Posk02026!";
  const BATAS_WAKTU_MS = 2 * 60 * 60 * 1000; // 2 Jam (dalam milidetik)

  function cekSesi() {
    const sesi = localStorage.getItem('sesiPosko');
    const waktuSesi = localStorage.getItem('waktuSesiPosko');
    
    if (sesi === 'aktif' && waktuSesi) {
      const selisih = Date.now() - parseInt(waktuSesi);
      if (selisih < BATAS_WAKTU_MS) {
        // Sesi masih aman
        document.getElementById('layarLogin').style.display = 'none';
        // Jalankan timer untuk logout otomatis sesuai sisa waktu
        setTimeout(prosesLogout, BATAS_WAKTU_MS - selisih);
        return;
      } else {
        // Sesi sudah lewat 2 jam
        munculkanNotifikasiSesiHabis();
      }
    }
  }

  function prosesLogout() {
    localStorage.removeItem('sesiPosko');
    localStorage.removeItem('waktuSesiPosko');
    
    // Tampilkan animasi sinkronisasi logout sebelum memutus akses
    document.getElementById('layarLogin').style.display = 'flex';
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('inputPassword').style.display = 'none';
    document.getElementById('spinnerLogin').style.display = 'block';
    document.getElementById('teksNotifikasi').innerText = "Sesi Anda telah berakhir. Mengakhiri sesi dengan aman...";
    
    setTimeout(() => {
      document.getElementById('spinnerLogin').style.display = 'none';
      document.getElementById('btnLogin').style.display = 'block';
      document.getElementById('inputPassword').style.display = 'block';
      munculkanNotifikasiSesiHabis();
    }, 1500);
  }

  function munculkanNotifikasiSesiHabis() {
    document.getElementById('layarLogin').style.display = 'flex';
    document.getElementById('teksNotifikasi').innerHTML = '<span style="color: #ef4444; font-weight: bold;">Sesi expired (Batas 2 Jam).<br>Silakan login kembali untuk melanjutkan.</span>';
    document.getElementById('inputPassword').value = '';
  }

  document.getElementById('btnLogin').addEventListener('click', () => {
    const pass = document.getElementById('inputPassword').value;
    const btn = document.getElementById('btnLogin');
    const spinner = document.getElementById('spinnerLogin');
    
    // Matikan tombol, jalankan animasi loading
    btn.style.display = 'none';
    spinner.style.display = 'block';

    setTimeout(() => {
      if (pass === PASS_BENAR) {
        localStorage.setItem('sesiPosko', 'aktif');
        localStorage.setItem('waktuSesiPosko', Date.now());
        
        spinner.style.display = 'none';
        btn.style.display = 'block';
        document.getElementById('layarLogin').style.display = 'none';
        
        // Mulai hitung mundur 2 jam
        setTimeout(prosesLogout, BATAS_WAKTU_MS);
      } else {
        spinner.style.display = 'none';
        btn.style.display = 'block';
        alert('Password Salah! Silakan coba lagi.');
      }
    }, 800); // Simulasi proses verifikasi agar tidak terlihat mendadak
  });

  // Eksekusi setiap kali halaman di-refresh
  cekSesi();
</script>
</body>
</html>
